<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Next Stage</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Montserrat:wght@100;200&display=swap');

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --black: #000000;
      --white: #ffffff;
      --gold: #b8956a;
      --dim: rgba(0, 0, 0, 0.55);
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--black);
      cursor: none;
    }

    /* スマホはデフォルトカーソルを使用 */
    @media (hover: none) and (pointer: coarse) {
      html, body { cursor: auto; }
      .cursor, .cursor-ring { display: none; }
    }

    /* カスタムカーソル */
    .cursor {
      position: fixed;
      width: 6px;
      height: 6px;
      background: var(--gold);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: transform 0.1s ease, opacity 0.3s ease;
    }

    .cursor-ring {
      position: fixed;
      width: 36px;
      height: 36px;
      border: 1px solid rgba(184, 149, 106, 0.5);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      transition: transform 0.18s ease, width 0.3s ease, height 0.3s ease, opacity 0.3s ease;
    }

    /* 動画ラッパー：四辺にパディング、上部はロゴ分を確保 */
    .video-wrapper {
      position: fixed;
      top: 80px;
      left: 16px;
      right: 16px;
      bottom: 16px;
      z-index: 0;
      border-radius: 4px;
      overflow: hidden;
    }

    @media (max-width: 600px) {
      .video-wrapper {
        top: 60px;
        left: 8px;
        right: 8px;
        bottom: 8px;
      }
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: contain; /* スマホで動画全体が見えるように */
      display: block;
    }

    @media (min-width: 601px) {
      video { object-fit: cover; }
    }

    /* シネマスコープバー（上下の黒帯） */
    .scope-bar {
      position: fixed;
      left: 0;
      right: 0;
      height: 10vh;
      background: var(--black);
      z-index: 10;
      transition: height 0.8s cubic-bezier(0.76, 0, 0.24, 1);
    }
    .scope-bar.top { top: 0; }
    .scope-bar.bottom { bottom: 0; }

    /* ブランドロゴ：上部に固定 */
    .brand {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      text-align: center;
      pointer-events: none;
      opacity: 0;
      animation: fadeInBrand 2s ease 0.5s forwards;
      white-space: nowrap;
    }

    .brand-title {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(1.2rem, 3.5vw, 3rem);
      letter-spacing: 0.3em;
      color: var(--white);
      text-transform: uppercase;
      line-height: 1;
    }

    @media (max-width: 600px) {
      .brand { top: 14px; }
      .brand-title { font-size: clamp(1rem, 5vw, 1.4rem); }
    }

    /* 暗転オーバーレイ：フルスクリーン */
    .blackout {
      position: fixed;
      inset: 0;
      background: var(--black);
      z-index: 30;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }

    .blackout.active {
      opacity: 1;
      pointer-events: all;
    }

    /* エンディング画像：フルスクリーン・中央寄せコンテナ */
    .ending-image {
      position: fixed;
      inset: 0;
      z-index: 31;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--black);
    }

    .ending-image.visible {
      opacity: 1;
      pointer-events: all;
    }

    /* 画像＋ボタンをまとめるラッパー（画像の実寸に合わせてボタンを重ねる） */
    .ending-inner {
      position: relative;
      display: inline-flex; /* 画像の実寸に縮む */
      max-width: 100vw;
      max-height: 100vh;
    }

    .ending-inner img {
      display: block;
      max-width: 100vw;
      max-height: 100vh;
      width: auto;
      height: auto;
      object-fit: contain;
    }

    /* ◀ メインページに戻るボタン：画像の上・下方に絶対配置 */
    .back-btn {
      position: absolute;
      bottom: 6%;
      left: 50%;
      transform: translateX(-50%) translateY(16px);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 24px;
      border-radius: 999px;
      background: #fdf6e3;
      border: 1.5px solid #c9a87c;
      color: #6b3a1f;
      font-family: 'Noto Sans JP', 'Hiragino Sans', sans-serif;
      font-size: clamp(0.75rem, 2vw, 0.9rem);
      font-weight: 500;
      text-decoration: none;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.5s ease, transform 0.5s ease, background 0.3s ease;
      cursor: pointer;
    }

    .back-btn.float-in {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .back-btn:hover {
      background: #f5e8cc;
    }

    @media (hover: none) and (pointer: coarse) {
      .back-btn { cursor: auto; }
    }

    /* キーフレーム */
    @keyframes fadeInBrand {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @keyframes expandLine {
      from { width: 0; }
      to   { width: 60px; }
    }
  </style>
</head>
<body>

  <!-- カスタムカーソル -->
  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="cursorRing"></div>

  <!-- シネマスコープバー -->
  <div class="scope-bar top" id="topBar"></div>
  <div class="scope-bar bottom" id="bottomBar"></div>

  <!-- ブランドロゴ（上部固定） -->
  <div class="brand" id="brand">
    <div class="brand-title">Next Stage</div>
  </div>

  <!-- フルスクリーン動画 -->
  <div class="video-wrapper">
    <video id="mainVideo" autoplay playsinline muted>
      <source src="Next-stage/coming-soon.mp4" type="video/mp4">
    </video>
  </div>

  <!-- 暗転レイヤー -->
  <div class="blackout" id="blackout"></div>

  <!-- エンディング画像 -->
  <div class="ending-image" id="endingImage">
    <div class="ending-inner">
      <img src="Next-stage/next-stage.png" alt="Next Stage">
      <a href="https://shirazirashii.github.io/Datsuichi-memorial/" class="back-btn" id="backBtn">&#9664; メインページに戻る</a>
    </div>
  </div>

  <script>
    // カスタムカーソル
    const cursor = document.getElementById('cursor');
    const ring = document.getElementById('cursorRing');
    let mouseX = 0, mouseY = 0, ringX = 0, ringY = 0;

    document.addEventListener('mousemove', e => {
      mouseX = e.clientX;
      mouseY = e.clientY;
      cursor.style.left = mouseX + 'px';
      cursor.style.top  = mouseY + 'px';
    });

    (function animateRing() {
      ringX += (mouseX - ringX) * 0.12;
      ringY += (mouseY - ringY) * 0.12;
      ring.style.left = ringX + 'px';
      ring.style.top  = ringY + 'px';
      requestAnimationFrame(animateRing);
    })();

    // シネマスコープバーをフェードアウト（動画開始後）
    const topBar = document.getElementById('topBar');
    const bottomBar = document.getElementById('bottomBar');
    setTimeout(() => {
      topBar.style.height = '0';
      bottomBar.style.height = '0';
    }, 300);

    // 動画コントロール
    const video = document.getElementById('mainVideo');
    const brand = document.getElementById('brand');
    const blackout = document.getElementById('blackout');
    const endingImage = document.getElementById('endingImage');
    const backBtn = document.getElementById('backBtn');

    // 動画が進んだらロゴをフェードアウト
    video.addEventListener('timeupdate', () => {
      if (video.currentTime > 3) {
        brand.style.opacity = '0';
        brand.style.transition = 'opacity 1.5s ease';
      }
    });

    // 再生終了 → ロゴ・上部黒帯を即フェードアウト → 0.5秒暗転 → 画像フェードイン → 5秒後にボタンフロートイン
    video.addEventListener('ended', () => {
      brand.style.transition = 'opacity 0.5s ease';
      brand.style.opacity = '0';
      topBar.style.transition = 'height 0s, opacity 0.5s ease';
      topBar.style.opacity = '0';

      // Step1: 暗転
      blackout.classList.add('active');

      // Step2: 0.5秒後に画像フェードイン
      setTimeout(() => {
        endingImage.classList.add('visible');
      }, 500);

      // Step3: 5.5秒後（画像表示から5秒後）にボタンフロートイン
      setTimeout(() => {
        backBtn.classList.add('float-in');
      }, 5500);
    });
  </script>
</body>
</html>
