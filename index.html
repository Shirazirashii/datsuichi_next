<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Next Stage</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Montserrat:wght@100;200&display=swap');

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --black: #000000;
      --white: #ffffff;
      --gold: #b8956a;
      --dim: rgba(0, 0, 0, 0.55);
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--black);
      cursor: none;
    }

    /* カスタムカーソル */
    .cursor {
      position: fixed;
      width: 6px;
      height: 6px;
      background: var(--gold);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: transform 0.1s ease, opacity 0.3s ease;
    }

    .cursor-ring {
      position: fixed;
      width: 36px;
      height: 36px;
      border: 1px solid rgba(184, 149, 106, 0.5);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      transition: transform 0.18s ease, width 0.3s ease, height 0.3s ease, opacity 0.3s ease;
    }

    /* 動画ラッパー */
    .video-wrapper {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* シネマスコープバー（上下の黒帯） */
    .scope-bar {
      position: fixed;
      left: 0;
      right: 0;
      height: 10vh;
      background: var(--black);
      z-index: 10;
      transition: height 0.8s cubic-bezier(0.76, 0, 0.24, 1);
    }
    .scope-bar.top { top: 0; }
    .scope-bar.bottom { bottom: 0; }

    /* ブランドロゴ */
    .brand {
      position: fixed;
      top: 8vh;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      text-align: center;
      pointer-events: none;
      opacity: 0;
      animation: fadeInBrand 2s ease 0.5s forwards;
    }

    .brand-title {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2rem, 5vw, 4rem);
      letter-spacing: 0.35em;
      color: var(--white);
      text-transform: uppercase;
      line-height: 1;
    }

    /* 再生前スプラッシュ画面 */
    .play-screen {
      position: fixed;
      inset: 0;
      background: var(--black);
      z-index: 40;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3rem;
      opacity: 1;
      transition: opacity 1.2s ease;
    }

    .play-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .play-logo {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2rem, 5vw, 4rem);
      letter-spacing: 0.35em;
      color: var(--white);
      text-transform: uppercase;
      line-height: 1;
    }

    .play-btn {
      width: 80px;
      height: 80px;
      border: 1px solid rgba(184, 149, 106, 0.5);
      border-radius: 50%;
      background: none;
      cursor: none;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.3s ease, transform 0.3s ease;
      position: relative;
    }

    .play-btn::after {
      content: '';
      display: block;
      width: 0;
      height: 0;
      border-top: 12px solid transparent;
      border-bottom: 12px solid transparent;
      border-left: 20px solid var(--gold);
      margin-left: 5px;
      transition: border-left-color 0.3s ease;
    }

    .play-btn:hover {
      border-color: var(--gold);
      transform: scale(1.1);
    }

    .play-hint {
      font-family: 'Montserrat', sans-serif;
      font-weight: 100;
      font-size: 0.6rem;
      letter-spacing: 0.5em;
      color: rgba(255, 255, 255, 0.3);
      text-transform: uppercase;
      margin-top: -1.5rem;
    }

    /* 右下の時間インジケーター */
    .time-indicator {
      position: fixed;
      bottom: 12vh;
      right: 3vw;
      z-index: 20;
      font-family: 'Montserrat', sans-serif;
      font-weight: 100;
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      color: rgba(255, 255, 255, 0.35);
      display: flex;
      align-items: center;
      gap: 0.8rem;
      opacity: 0;
      animation: fadeInBrand 1s ease 2s forwards;
    }

    .progress-track {
      width: 80px;
      height: 1px;
      background: rgba(255,255,255,0.15);
      position: relative;
      overflow: hidden;
    }

    .progress-fill {
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      width: 0%;
      background: var(--gold);
      transition: width 0.5s linear;
    }

    /* キーフレーム */
    @keyframes fadeInBrand {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
  </style>
</head>
<body>

  <!-- カスタムカーソル -->
  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="cursorRing"></div>

  <!-- シネマスコープバー -->
  <div class="scope-bar top" id="topBar"></div>
  <div class="scope-bar bottom" id="bottomBar"></div>

  <!-- スプラッシュ再生画面 -->
  <div class="play-screen" id="playScreen">
    <div class="play-logo">Next Stage</div>
    <button class="play-btn" id="playBtn"></button>
    <div class="play-hint">Click to Play</div>
  </div>

  <!-- ブランドロゴ（動画上に重ねる） -->
  <div class="brand" id="brand">
    <div class="brand-title">Next Stage</div>
  </div>

  <!-- フルスクリーン動画 -->
  <div class="video-wrapper">
    <video id="mainVideo" playsinline>
      <source src="next-stage/coming-soon.mp4" type="video/mp4">
    </video>
  </div>

  <!-- 右下の進行インジケーター -->
  <div class="time-indicator" id="timeIndicator">
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <span id="timeDisplay">0:00</span>
  </div>

  <script>
    // カスタムカーソル
    const cursor = document.getElementById('cursor');
    const ring = document.getElementById('cursorRing');
    let mouseX = 0, mouseY = 0, ringX = 0, ringY = 0;

    document.addEventListener('mousemove', e => {
      mouseX = e.clientX;
      mouseY = e.clientY;
      cursor.style.left = mouseX + 'px';
      cursor.style.top  = mouseY + 'px';
    });

    (function animateRing() {
      ringX += (mouseX - ringX) * 0.12;
      ringY += (mouseY - ringY) * 0.12;
      ring.style.left = ringX + 'px';
      ring.style.top  = ringY + 'px';
      requestAnimationFrame(animateRing);
    })();

    // シネマスコープバーをフェードアウト（動画開始後）
    const topBar = document.getElementById('topBar');
    const bottomBar = document.getElementById('bottomBar');

    // 動画・UI要素
    const video = document.getElementById('mainVideo');
    const brand = document.getElementById('brand');
    const progressFill = document.getElementById('progressFill');
    const timeDisplay = document.getElementById('timeDisplay');
    const playScreen = document.getElementById('playScreen');
    const playBtn = document.getElementById('playBtn');

    // ▶ PLAYボタンで再生開始
    function startPlayback() {
      playScreen.classList.add('hidden');
      setTimeout(() => {
        topBar.style.height = '0';
        bottomBar.style.height = '0';
        video.play();
      }, 400);
    }

    playBtn.addEventListener('click', startPlayback);

    // ホバー時にリングを拡大（PLAYボタン）
    playBtn.addEventListener('mouseenter', () => {
      ring.style.width = '100px';
      ring.style.height = '100px';
    });
    playBtn.addEventListener('mouseleave', () => {
      ring.style.width = '36px';
      ring.style.height = '36px';
    });

    // 動画が進んだらロゴをフェードアウト
    video.addEventListener('timeupdate', () => {
      const pct = (video.currentTime / video.duration) * 100;
      progressFill.style.width = pct + '%';

      const s = Math.floor(video.currentTime);
      timeDisplay.textContent = `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;

      if (video.currentTime > 3) {
        brand.style.opacity = '0';
        brand.style.transition = 'opacity 1.5s ease';
      }
    });

  </script>
</body>
</html>
